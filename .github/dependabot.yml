version: 2
updates:
  - package-ecosystem: bundler
    directory: "/"
    schedule:
      interval: weekly
      day: thursday
      time: "08:30"
      timezone: America/New_York
    groups:
      bundler:
        patterns:
          - "*"
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: thursday
      time: "08:30"
      timezone: America/New_York
    groups:
      github_actions:
        patterns:
          - "*"
